name: Build Android APK

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    branches: [main]
    paths:
      - 'gardening-app/**'
      - 'packages/shared/**'
      - '.github/workflows/build-android-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            packages/shared/package-lock.json
            gardening-web/package-lock.json
            gardening-app/package-lock.json

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install dependencies
        run: npm run install:all

      - name: Prebuild Android project
        working-directory: gardening-app
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_MAPBOX_ACCESS_TOKEN: ${{ secrets.EXPO_PUBLIC_MAPBOX_ACCESS_TOKEN }}
        run: npx expo prebuild --platform android --no-install

      - name: Create release keystore
        run: |
          keytool -genkeypair -v \
            -storetype PKCS12 \
            -keystore "$RUNNER_TEMP/garden-release.keystore" \
            -alias gardenmap \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Garden Map,O=Garden,C=US"

      - name: Build standalone release APK
        working-directory: gardening-app/android
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_MAPBOX_ACCESS_TOKEN: ${{ secrets.EXPO_PUBLIC_MAPBOX_ACCESS_TOKEN }}
        run: |
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$RUNNER_TEMP/garden-release.keystore" \
            -Pandroid.injected.signing.store.password=android \
            -Pandroid.injected.signing.key.alias=gardenmap \
            -Pandroid.injected.signing.key.password=android

      - name: Prepare APK artifact
        run: cp gardening-app/android/app/build/outputs/apk/release/app-release.apk garden-map.apk

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v5
        with:
          name: garden-map-apk
          path: garden-map.apk
          if-no-files-found: error

      - name: Attach APK to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: garden-map.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
